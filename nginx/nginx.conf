# =============================================================================
# Ingenio+ — Nginx Plan Raíz (Orange Pi 5B)
# Dashboard Laboratorio Microbiología — SENA SENNOVA
# Proxy: InfluxDB + Home Assistant API
# =============================================================================

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        # Portal cliente — dashboard laboratorio
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Proxy InfluxDB — token inyectado server-side
        location /api/historial {
            proxy_pass http://ingenio_influxdb:8086/api/v2/query;
            proxy_set_header Authorization "Token INFLUXDB_TOKEN_PLACEHOLDER";
            proxy_set_header Content-Type "application/vnd.flux";
            proxy_set_header Accept "application/csv";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            if ($request_method = OPTIONS) { return 204; }
        }

        # Proxy Home Assistant API — evita CORS y expone en mismo origen
        location /ha/ {
            proxy_pass http://ingenio_homeassistant:8123/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            if ($request_method = OPTIONS) { return 204; }
        }
    }
}

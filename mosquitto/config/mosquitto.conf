# senaiot — Mosquitto configuración
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Anónimo a propósito: redes de laboratorio cerradas, no expuestas a
# internet ni a campo abierto. Prioriza deploy sin fricción (MVP) sobre
# autenticación MQTT. Si en algún momento el lab se conecta a una red
# menos confiable, volver a allow_anonymous false + password_file.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
